name: diceframe

services:
  web:
    build:
      context: .
    image: diceframe:local
    container_name: diceframe-web
    ports:
      - "${DICEFRAME_HTTP_PORT:-9876}:9876"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TRPG_WEB_HOST: "0.0.0.0"
      TRPG_WEB_PORT: "9876"
      TRPG_DATA_DIR: "/app/data"

      TRPG_LLM_API_KEY: "${TRPG_LLM_API_KEY:-}"
      TRPG_LLM_BASE_URL: "${TRPG_LLM_BASE_URL:-}"
      TRPG_LLM_MODEL: "${TRPG_LLM_MODEL:-}"
      TRPG_API_KEY: "${TRPG_API_KEY:-}"
      TRPG_BASE_URL: "${TRPG_BASE_URL:-}"
      TRPG_MODEL: "${TRPG_MODEL:-}"
      TRPG_ACCESS_TOKEN: "${TRPG_ACCESS_TOKEN:-}"
      TRPG_PROXY_URL: "${TRPG_PROXY_URL:-}"

      TRPG_BOT_TOKEN: "${TRPG_BOT_TOKEN:-}"
      NAPCAT_HOST: "${NAPCAT_HOST:-}"
      NAPCAT_PORT: "${NAPCAT_PORT:-}"
      NAPCAT_TOKEN: "${NAPCAT_TOKEN:-}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
